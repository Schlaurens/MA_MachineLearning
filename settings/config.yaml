training:
  epochs: 400
  initial_epoch: 0
  batch_size: 32
  model_input_dims: [480, 320]
  encoder_architecture: "default_heavy"
  only_train_encoder: False
  verbose: 0
  load_checkpoint:
    from_checkpoint: False # < when starting training from checkpoint
    initial_epoch: 0
    timestamp: "20250925-134902" 
    encoder_only: False # < when only loading the encoder
    verbose: True
  load_model:
    from_model: False
    timestamp: "20250925-134902"
    filepath: "models"
    encoder_only: False # < when only loading the encoder
    verbose: True

callbacks:
  reduce_lr:
    monitor: "val_total_loss"
    mode: "min"
    factor: 0.2
    patience: 40
    min_lr: 0.0
  early_stopping:
    monitor: "val_total_loss"
    mode: "min"
    patience: 40
  log_dir: "logs/fit/"
  checkpoint_dir: "checkpoints/"

data:
  train_path: "data/train_ds*.tfrecords"
  val_path: "data/val_ds*.tfrecords"